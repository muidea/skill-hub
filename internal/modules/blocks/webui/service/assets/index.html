<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Skill Hub | 技能目录</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fa;
      --panel: #ffffff;
      --panel-muted: #fafafa;
      --line: #f0f0f0;
      --line-strong: #d9d9d9;
      --text: rgba(0, 0, 0, 0.88);
      --text-secondary: rgba(0, 0, 0, 0.65);
      --text-tertiary: rgba(0, 0, 0, 0.45);
      --primary: #1677ff;
      --primary-hover: #4096ff;
      --primary-soft: #e6f4ff;
      --radius: 16px;
      --mono: "SFMono-Regular", Consolas, Menlo, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--sans);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(22, 119, 255, 0.08), transparent 24%),
        linear-gradient(180deg, #f7faff 0%, #f5f7fa 38%, #f5f7fa 100%);
    }

    .shell {
      max-width: 1240px;
      margin: 0 auto;
      padding: 28px 24px 40px;
    }

    .hero,
    .panel {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(240, 240, 240, 0.92);
      border-radius: var(--radius);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .hero {
      padding: 28px;
      margin-bottom: 20px;
      background: linear-gradient(135deg, rgba(22, 119, 255, 0.12), rgba(255, 255, 255, 0.94) 56%);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
    }

    h1 {
      margin: 14px 0 10px;
      font-size: clamp(30px, 4vw, 42px);
      line-height: 1.12;
    }

    .hero p {
      margin: 0;
      max-width: 760px;
      color: var(--text-secondary);
      line-height: 1.7;
      font-size: 14px;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    .panel {
      padding: 20px;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 18px;
    }

    .panel-title h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
    }

    .panel-title p {
      margin: 6px 0 0;
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.5;
    }

    .badge,
    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .badge,
    .chip-primary {
      background: var(--primary-soft);
      color: var(--primary);
      border-color: #bae0ff;
    }

    .chip-neutral {
      background: var(--panel-muted);
      color: var(--text-secondary);
      border-color: var(--line);
    }

    .toolbar,
    .pagination,
    .pagination-controls,
    .meta-line {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .toolbar {
      margin-bottom: 16px;
    }

    .field {
      display: grid;
      gap: 6px;
      min-width: 0;
      flex: 1 1 180px;
    }

    .field label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    input,
    select,
    button {
      font: inherit;
    }

    input,
    select {
      width: 100%;
      height: 40px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--line-strong);
      background: #fff;
      color: var(--text);
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--primary-hover);
      box-shadow: 0 0 0 3px rgba(22, 119, 255, 0.12);
    }

    button {
      height: 40px;
      padding: 0 16px;
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all .2s ease;
      font-weight: 500;
      white-space: nowrap;
    }

    button.primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 6px 12px rgba(22, 119, 255, 0.22);
    }

    button.primary:hover { background: var(--primary-hover); }

    button.secondary {
      background: #fff;
      color: var(--text);
      border-color: var(--line-strong);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .metric {
      padding: 14px;
      border-radius: 14px;
      background: var(--panel-muted);
      border: 1px solid var(--line);
    }

    .metric span {
      display: block;
      font-size: 12px;
      color: var(--text-tertiary);
      margin-bottom: 8px;
    }

    .metric strong {
      display: block;
      font-size: 28px;
      line-height: 1;
      font-weight: 700;
    }

    .metric small {
      display: block;
      margin-top: 8px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 12px;
    }

    .card-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      background: linear-gradient(180deg, #ffffff 0%, #fcfcfc 100%);
    }

    .item-title {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .item-title strong {
      font-size: 16px;
      font-weight: 600;
      overflow-wrap: anywhere;
    }

    .mono { font-family: var(--mono); }

    .desc {
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .empty {
      color: var(--text-tertiary);
    }

    .pagination {
      justify-content: space-between;
      margin-top: 14px;
    }

    .pagination-info {
      color: var(--text-secondary);
      font-size: 12px;
    }

    .page-size {
      width: 92px;
      min-width: 92px;
    }

    .page-jump {
      width: 88px;
      min-width: 88px;
      height: 36px;
    }

    .pagination button {
      min-width: 40px;
      padding: 0 12px;
      height: 36px;
    }

    .pagination button.is-active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    @media (max-width: 768px) {
      .shell { padding: 18px 14px 28px; }
      .hero, .panel { padding: 16px; }
      .stats { grid-template-columns: 1fr; }
      .panel-header, .pagination { flex-direction: column; align-items: stretch; }
      .field, button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="eyebrow">Skill Catalog</div>
      <h1>Skill Hub 技能目录</h1>
      <p>面向普通用户的只读技能视图。你可以按仓库和目标筛选当前可用技能，并通过分页快速浏览目录。</p>
      <div class="hero-actions">
        <button class="primary" id="refresh-skills" type="button">刷新技能目录</button>
        <button class="secondary" type="button" onclick="window.location.href='/admin.html'">进入管理端</button>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <div class="panel-title">
          <h2>技能目录</h2>
          <p>仅展示技能索引，不包含仓库管理和项目工作区能力。</p>
        </div>
        <span class="badge">User View</span>
      </div>

      <div class="stats">
        <div class="metric">
          <span>技能总数</span>
          <strong id="summary-skills">0</strong>
          <small id="summary-target">目标过滤: 全部</small>
        </div>
        <div class="metric">
          <span>仓库数量</span>
          <strong id="summary-repos">0</strong>
          <small>当前过滤结果关联仓库</small>
        </div>
      </div>

      <div class="toolbar">
        <div class="field">
          <label for="repo-filter">仓库过滤</label>
          <input id="repo-filter" placeholder="例如: main 或 community">
        </div>
        <div class="field">
          <label for="target-filter">目标过滤</label>
          <select id="target-filter">
            <option value="">全部目标</option>
            <option value="open_code">open_code</option>
            <option value="cursor">cursor</option>
            <option value="claude_code">claude_code</option>
          </select>
        </div>
      </div>

      <ul id="skills" class="list"><li class="card-item empty">加载中...</li></ul>
      <div id="skills-pagination" class="pagination"></div>
    </section>
  </div>

  <script>
    const state = {
      skills: [],
      page: 1,
      pageSize: 8,
      totalPages: 1
    };

    async function api(path, options = {}) {
      const res = await fetch(path, { headers: { "Content-Type": "application/json" }, ...options });
      const data = await res.json();
      if (!res.ok || data.code !== "OK") {
        throw new Error(data.message || "request failed");
      }
      return data.data;
    }

    function paginate() {
      const totalPages = Math.max(1, Math.ceil(state.skills.length / state.pageSize));
      state.totalPages = totalPages;
      if (state.page > totalPages) state.page = totalPages;
      if (state.page < 1) state.page = 1;
      const start = (state.page - 1) * state.pageSize;
      return {
        items: state.skills.slice(start, start + state.pageSize),
        total: state.skills.length,
        totalPages,
        start: start + 1,
        end: Math.min(state.skills.length, start + state.pageSize),
        page: state.page
      };
    }

    function setOverview(pageData) {
      const repoSet = new Set(state.skills.map(item => item.repository).filter(Boolean));
      const target = document.getElementById("target-filter").value.trim() || "全部";
      document.getElementById("summary-skills").textContent = String(state.skills.length);
      document.getElementById("summary-repos").textContent = String(repoSet.size);
      document.getElementById("summary-target").textContent = `目标过滤: ${target}`;
    }

    function renderSkills() {
      const root = document.getElementById("skills");
      const pageData = paginate();
      setOverview(pageData);

      if (!pageData.total) {
        root.innerHTML = '<li class="card-item empty">暂无技能</li>';
        document.getElementById("skills-pagination").innerHTML = "";
        return;
      }

      root.innerHTML = pageData.items.map(item => `
        <li class="card-item">
          <div class="item-title">
            <strong class="mono">${escapeHtml(item.id)}</strong>
            ${item.repository ? `<span class="chip chip-primary">${escapeHtml(item.repository)}</span>` : ""}
          </div>
          <div class="desc">${escapeHtml(item.description || "无描述")}</div>
          <div class="meta-line">
            <span class="chip chip-neutral">version ${escapeHtml(item.version || "-")}</span>
            <span class="chip chip-neutral">${escapeHtml(item.compatibility || "未声明目标")}</span>
          </div>
        </li>`).join("");

      renderPagination(pageData);
    }

    function renderPagination(pageData) {
      const root = document.getElementById("skills-pagination");
      const pages = [];
      const begin = Math.max(1, pageData.page - 1);
      const finish = Math.min(pageData.totalPages, begin + 2);
      for (let i = begin; i <= finish; i++) pages.push(i);

      root.innerHTML = `
        <div class="pagination-info">第 ${pageData.page} / ${pageData.totalPages} 页</div>
        <div class="pagination-controls">
          <select class="page-size" onchange="changePageSize(this.value)">
            ${[6, 8, 12, 16, 24].map(size => `<option value="${size}" ${size === state.pageSize ? "selected" : ""}>${size} / 页</option>`).join("")}
          </select>
          <button class="secondary" type="button" onclick="changePage(${pageData.page - 1})" ${pageData.page <= 1 ? "disabled" : ""}>上一页</button>
          ${pages.map(page => `<button class="secondary ${page === pageData.page ? "is-active" : ""}" type="button" onclick="changePage(${page})">${page}</button>`).join("")}
          <button class="secondary" type="button" onclick="changePage(${pageData.page + 1})" ${pageData.page >= pageData.totalPages ? "disabled" : ""}>下一页</button>
          <input class="page-jump" type="number" min="1" max="${pageData.totalPages}" value="${pageData.page}" onchange="jumpToPage(this.value)">
        </div>
      `;
    }

    function changePage(page) {
      state.page = page;
      renderSkills();
    }

    function jumpToPage(value) {
      const page = Number(value);
      if (!Number.isFinite(page)) return;
      state.page = page;
      renderSkills();
    }

    function changePageSize(value) {
      state.pageSize = Number(value);
      state.page = 1;
      renderSkills();
    }

    async function refreshSkills() {
      const repo = document.getElementById("repo-filter").value.trim();
      const target = document.getElementById("target-filter").value.trim();
      const query = new URLSearchParams();
      if (repo) query.set("repo", repo);
      if (target) query.set("target", target);

      const data = await api(`/api/v1/skills?${query.toString()}`);
      state.skills = data.items || [];
      state.page = 1;
      renderSkills();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    document.getElementById("refresh-skills").addEventListener("click", refreshSkills);
    document.getElementById("repo-filter").addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        refreshSkills();
      }
    });
    document.getElementById("target-filter").addEventListener("change", () => {
      refreshSkills();
    });

    refreshSkills().catch((err) => {
      console.error(err);
      alert(err.message);
    });
  </script>
</body>
</html>
